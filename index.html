<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeShare — Women's Safety Companion</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🛡️ SafeShare</h1>
    <p>Your one-tap safety companion</p>
  </header>

  <main>
    <!-- Emergency Contacts Section -->
    <section id="contacts-section">
      <h2>Emergency Contacts</h2>
      <div id="contacts-list"></div>
      <div class="add-contact-form">
        <input type="text" id="contact-name" placeholder="Contact name">
        <input type="tel" id="contact-number" placeholder="WhatsApp number (with country code)">
        <button onclick="addContact()">+ Add Contact</button>
      </div>
    </section>

    <!-- SOS Button Section -->
     <section id="sos-section">
      <div class="sos-wrapper">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <button id="sos-btn" onclick="triggerSOS()">🚨 SOS</button>
      </div>
      <p id="status-text"></p>
    </section>

    <!-- Recording Section -->
    <section id="recording-section">
      <h2>Emergency Recording</h2>
      <video id="camera-preview" autoplay muted playsinline></video>
      <div class="recording-controls">
        <button id="record-btn" onclick="toggleRecording()">🎥 Start Recording</button>
      </div>
      <p id="recording-status"></p>
      <div id="recordings-list"></div>
    </section>
    
    <!-- Unsafe Areas Map -->
    <section id="map-section">
      <h2>Unsafe Areas Map</h2>
      <p class="map-hint">Tap anywhere on the map to report a spot that felt unsafe.</p>
      <div id="unsafe-map"></div>
      <div id="report-form" class="report-form hidden">
        <select id="report-category">
          <option value="lighting">Poor lighting</option>
          <option value="harassment">Harassment reported</option>
          <option value="isolated">Isolated / empty area</option>
          <option value="other">Other concern</option>
        </select>
        <textarea id="report-note" placeholder="Add a short note (optional)"></textarea>
        <div class="report-form-buttons">
          <button onclick="saveReport()">Submit Report</button>
          <button onclick="cancelReport()" class="cancel-btn">Cancel</button>
        </div>
      </div>
    </section>

    <!-- Helpline Directory -->
    <section id="helpline-section">
      <h2>Quick Help</h2>
      <a href="tel:100" class="helpline-btn">📞 Police (100)</a>
      <a href="tel:1091" class="helpline-btn">📞 Women's Helpline (1091)</a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
